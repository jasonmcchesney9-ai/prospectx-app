<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 154" width="280" height="154">

  <defs>
    <filter id="pxi-glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pxi-ts">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="b"/>
      <feOffset dx="0" dy="2" result="ob"/>
      <feMerge><feMergeNode in="ob"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pxi-pg">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="pxi-ice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0F2942"/>
      <stop offset="60%"  style="stop-color:#0D2238"/>
      <stop offset="100%" style="stop-color:#091C30"/>
    </linearGradient>
    <linearGradient id="pxi-tb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#14B8A8"/>
      <stop offset="50%"  style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#0A7A70"/>
    </linearGradient>
    <radialGradient id="pxi-pf" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   style="stop-color:#FB923C"/>
      <stop offset="50%"  style="stop-color:#EA580C"/>
      <stop offset="85%"  style="stop-color:#C2410C"/>
      <stop offset="100%" style="stop-color:#7C2006"/>
    </radialGradient>
    <radialGradient id="pxi-pr" cx="50%" cy="50%" r="50%">
      <stop offset="72%"  style="stop-color:rgba(0,0,0,0)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.6)"/>
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <rect x="2" y="2" width="276" height="150" rx="56" ry="56"
        fill="none" stroke="#0D9488" stroke-width="1.5" opacity="0.2" filter="url(#pxi-glow)"/>
  <!-- Teal border -->
  <rect x="4" y="4" width="272" height="146" rx="54" ry="54"
        fill="none" stroke="url(#pxi-tb)" stroke-width="7.5"/>
  <!-- Navy body -->
  <rect x="8" y="8" width="264" height="138" rx="52" ry="52" fill="url(#pxi-ice)"/>
  <!-- Dasher board trim -->
  <rect x="11.5" y="11.5" width="257" height="131" rx="51" ry="51"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <rect x="13" y="13" width="254" height="128" rx="50" ry="50"
        fill="none" stroke="rgba(251,146,60,0.32)" stroke-width="1.2"/>

  <!-- Centre line + circle + dot -->
  <line x1="140" y1="20" x2="140" y2="134" stroke="rgba(251,146,60,0.13)" stroke-width="1.4"/>
  <circle cx="140" cy="77" r="34" fill="none" stroke="rgba(251,146,60,0.10)" stroke-width="1.1"/>
  <circle cx="140" cy="77" r="2.2" fill="rgba(251,146,60,0.18)"/>

  <!-- Faceoff dots -->
  <circle cx="84"  cy="50"  r="2.2" fill="rgba(251,146,60,0.15)"/>
  <circle cx="196" cy="50"  r="2.2" fill="rgba(251,146,60,0.15)"/>
  <circle cx="84"  cy="104" r="2.2" fill="rgba(251,146,60,0.15)"/>
  <circle cx="196" cy="104" r="2.2" fill="rgba(251,146,60,0.15)"/>

  <!-- Left goal net -->
  <line x1="26" y1="63" x2="26" y2="91" stroke="rgba(13,148,136,0.22)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="26" y1="63" x2="37" y2="63" stroke="rgba(13,148,136,0.22)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="26" y1="91" x2="37" y2="91" stroke="rgba(13,148,136,0.22)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="37" y1="63" x2="37" y2="91" stroke="rgba(13,148,136,0.20)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="26" y1="67" x2="37" y2="67" stroke="rgba(13,148,136,0.09)" stroke-width=".7"/>
  <line x1="26" y1="72" x2="37" y2="72" stroke="rgba(13,148,136,0.09)" stroke-width=".7"/>
  <line x1="26" y1="77" x2="37" y2="77" stroke="rgba(13,148,136,0.09)" stroke-width=".7"/>
  <line x1="26" y1="82" x2="37" y2="82" stroke="rgba(13,148,136,0.09)" stroke-width=".7"/>
  <line x1="26" y1="87" x2="37" y2="87" stroke="rgba(13,148,136,0.09)" stroke-width=".7"/>
  <line x1="29" y1="63" x2="29" y2="91" stroke="rgba(13,148,136,0.07)" stroke-width=".7"/>
  <line x1="32" y1="63" x2="32" y2="91" stroke="rgba(13,148,136,0.07)" stroke-width=".7"/>
  <line x1="35" y1="63" x2="35" y2="91" stroke="rgba(13,148,136,0.07)" stroke-width=".7"/>
  <path d="M37 63 Q50 77 37 91" fill="rgba(13,148,136,0.04)" stroke="rgba(13,148,136,0.09)" stroke-width=".9"/>

  <!-- Right goal net -->
  <line x1="254" y1="63" x2="254" y2="91" stroke="rgba(13,148,136,0.22)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="243" y1="63" x2="254" y2="63" stroke="rgba(13,148,136,0.22)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="243" y1="91" x2="254" y2="91" stroke="rgba(13,148,136,0.22)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="243" y1="63" x2="243" y2="91" stroke="rgba(13,148,136,0.20)" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="243" y1="67" x2="254" y2="67" stroke="rgba(13,148,136,0.09)" stroke-width=".7"/>
  <line x1="243" y1="72" x2="254" y2="72" stroke="rgba(13,148,136,0.09)" stroke-width=".7"/>
  <line x1="243" y1="77" x2="254" y2="77" stroke="rgba(13,148,136,0.09)" stroke-width=".7"/>
  <line x1="243" y1="82" x2="254" y2="82" stroke="rgba(13,148,136,0.09)" stroke-width=".7"/>
  <line x1="243" y1="87" x2="254" y2="87" stroke="rgba(13,148,136,0.09)" stroke-width=".7"/>
  <line x1="246" y1="63" x2="246" y2="91" stroke="rgba(13,148,136,0.07)" stroke-width=".7"/>
  <line x1="249" y1="63" x2="249" y2="91" stroke="rgba(13,148,136,0.07)" stroke-width=".7"/>
  <line x1="252" y1="63" x2="252" y2="91" stroke="rgba(13,148,136,0.07)" stroke-width=".7"/>
  <path d="M243 63 Q230 77 243 91" fill="rgba(13,148,136,0.04)" stroke="rgba(13,148,136,0.09)" stroke-width=".9"/>

  <!-- PXI wordmark — X on centre line -->
  <text x="93"  y="77" font-family="'Arial Black',Arial,sans-serif" font-size="64" font-weight="900" fill="#FFF" text-anchor="middle" dominant-baseline="central" filter="url(#pxi-ts)">P</text>
  <text x="140" y="77" font-family="'Arial Black',Arial,sans-serif" font-size="64" font-weight="900" fill="#FFF" text-anchor="middle" dominant-baseline="central" filter="url(#pxi-ts)">X</text>
  <text x="187" y="77" font-family="'Arial Black',Arial,sans-serif" font-size="64" font-weight="900" fill="#FFF" text-anchor="middle" dominant-baseline="central" filter="url(#pxi-ts)">I</text>

  <!-- Puck (top-down view) -->
  <circle cx="215" cy="31" r="13" fill="rgba(0,0,0,0.3)" transform="translate(1.5,2)"/>
  <circle cx="215" cy="31" r="13" fill="url(#pxi-pf)" filter="url(#pxi-pg)"/>
  <circle cx="215" cy="31" r="13" fill="url(#pxi-pr)"/>
  <circle cx="215" cy="31" r="13" fill="none" stroke="rgba(0,0,0,0.45)" stroke-width="1.2"/>
  <circle cx="215" cy="31" r="8.5" fill="none" stroke="rgba(0,0,0,0.20)" stroke-width="1"/>
  <ellipse cx="209" cy="25.5" rx="4.5" ry="2.2" fill="rgba(255,255,255,0.30)" transform="rotate(-30 209 25.5)"/>

  <!-- Outer shimmer -->
  <rect x="4" y="4" width="272" height="146" rx="54" ry="54"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

</svg>
